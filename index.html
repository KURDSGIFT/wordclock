<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاقیکردنەوەی ئاسایشی Firebase</title>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 30px; background-color: #f4f6f9; text-align: center; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        input { padding: 10px; width: 80%; font-size: 16px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
        #result { margin-top: 25px; padding: 15px; border-radius: 5px; text-align: left; max-height: 300px; overflow-y: auto; }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; text-align: center; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>تاقیکەرەوەی ئاسایشی Firebase Firestore</h2>
    <p>ناوی ئەو کۆلێکشنە (Collection) بنووسە کە دەتەوێت تاقیکردنەوەی لەسەر بکەیت (بۆ نموونە: <code>users</code>):</p>
    <input type="text" id="collectionName" value="users"><br>
    <button id="testBtn">دەستپێکردنی تاقیکردنەوە</button>
    <div id="result"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDgTzt5Ui00d5-NJWlpKa6pNGw5D2mbfzE",
  authDomain: "bdozarawa2.firebaseapp.com",
  projectId: "bdozarawa2",
  storageBucket: "bdozarawa2.firebasestorage.app",
  messagingSenderId: "20279723956",
  appId: "1:20279723956:web:f93db1652e532fbf8694e1",
  measurementId: "G-C0PB34CXWP"
};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('testBtn').addEventListener('click', async () => {
        const resultDiv = document.getElementById('result');
        const collName = document.getElementById('collectionName').value;
        resultDiv.className = '';
        resultDiv.innerHTML = 'کاتی تاقیکردنەوە...';

        try {
            // هەوڵدان بۆ خوێندنەوەی ٣ دۆکیومێنت بەبێ ئەوەی هیچ ئەکاونتێک لۆگین بووبێت
            const q = query(collection(db, collName), limit(3));
            const querySnapshot = await getDocs(q);
            
            if(querySnapshot.empty) {
                resultDiv.className = 'danger';
                resultDiv.innerHTML = `<strong>ئەنجام:</strong> کۆلێکشنەکە بەتاڵە یان بوونی نییە، بەڵام ڕێگریت لێ نەکرا! ئەگەر داتای تێدا بێت، هاکەرەکە دەتوانێت بیبینێت.`;
                return;
            }

            let dataStr = '';
            querySnapshot.forEach((doc) => {
                dataStr += `${doc.id} => ${JSON.stringify(doc.data())}\n`;
            });

            resultDiv.className = 'danger';
            resultDiv.innerHTML = `<h3 style="color:#721c24; margin:0;">⚠️ داتابەیسەکەت پارێزراو نییە!</h3><p>توانرا بەبێ لۆگین داتاکان بخوێندرێتەوە:</p><pre dir="ltr">${dataStr}</pre>`;
            
        } catch (error) {
            if (error.code === 'permission-denied') {
                resultDiv.className = 'safe';
                resultDiv.innerHTML = `<h3 style="color:#155724; margin:0;">✅ داتابەیسەکەت پارێزراوە!</h3><p>Firebase ڕێگەی نەدا داتاکان بخوێندرێتەوە بەبێ مۆڵەت (Permission Denied).</p>`;
            } else {
                resultDiv.className = 'danger';
                resultDiv.innerHTML = `<strong>هەڵەیەک ڕوویدا:</strong> ${error.message}`;
            }
        }
    });
</script>
</body>
</html>
